name: Build Binary

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name=nanobroker main.py

      - uses: actions/upload-artifact@v4
        with:
          name: nanobroker-linux
          path: dist/nanobroker

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d')-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: "Automated build from commit ${{ github.sha }}"
          files: dist/nanobroker
          make_latest: true
